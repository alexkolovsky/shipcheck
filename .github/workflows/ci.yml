name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      # Show every Node version's result instead of cancelling the matrix on
      # the first failure.
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build

  rendered-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Playwright is an optional peer dependency; install it just for this job.
      - run: npm i --no-save playwright
      - run: npx playwright install --with-deps chromium
      - run: npx vitest run tests/scanner/render-smoke.test.ts
        env:
          SHIPCHECK_SMOKE: '1'
