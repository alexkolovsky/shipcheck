name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  # Required for npm Trusted Publishing (OIDC) and provenance attestation —
  # no NPM_TOKEN needed; npm mints a short-lived credential from this identity.
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - name: Verify tag matches package.json version
        run: |
          pkg="$(node -p "require('./package.json').version")"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$pkg" != "$tag" ]; then
            echo "Tag v$tag does not match package.json version $pkg" >&2
            exit 1
          fi
      # Trusted Publishing needs npm >= 11.5.1; Node 22 ships an older npm.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      # No token: OIDC provides the credential, and provenance is automatic.
      - run: npm publish --access public
