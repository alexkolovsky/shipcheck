name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  # Required for npm Trusted Publishing (OIDC) and provenance attestation —
  # no NPM_TOKEN needed; npm mints a short-lived credential from this identity.
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # No registry-url: it makes setup-node write an .npmrc with a dummy
      # _authToken, which blocks npm's OIDC exchange. The default registry is
      # already registry.npmjs.org, and OIDC handles auth.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Verify tag matches package.json version
        run: |
          pkg="$(node -p "require('./package.json').version")"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$pkg" != "$tag" ]; then
            echo "Tag v$tag does not match package.json version $pkg" >&2
            exit 1
          fi
      # Trusted Publishing (OIDC) needs npm >= 11.5.1; Node 22 ships npm 10.
      - name: Upgrade npm for OIDC trusted publishing
        run: |
          npm install -g npm@latest
          npm --version
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - name: Check OIDC token availability
        run: |
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "OK: GitHub OIDC token request URL is available"
          else
            echo "MISSING: no OIDC token request URL — id-token permission is not effective" >&2
            exit 1
          fi
      # No token: OIDC provides the credential, and provenance is automatic.
      # --loglevel http surfaces the OIDC exchange with the registry in the log.
      - run: npm publish --access public --loglevel http
