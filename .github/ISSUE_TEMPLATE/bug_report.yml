name: Bug report
description: Something scanned incorrectly, crashed, or produced a wrong/false-positive finding.
title: 'bug: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! A small reproducer (a URL, or a snippet of HTML)
        helps enormously. ShipCheck reads static HTML — if the page relies on
        client-side rendering, please mention that.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did ShipCheck report, and what did you expect instead?
      placeholder: |
        Expected: `a11y.image_alt.ok` to pass.
        Got: `a11y.image_alt.missing` flagged an image that is hidden with display:none.
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command
      description: The exact command you ran.
      placeholder: shipcheck https://example.com --ecommerce
    validations:
      required: true
  - type: input
    id: target
    attributes:
      label: Target
      description: The URL or local path scanned (or a reduced HTML snippet below).
      placeholder: https://example.com/products/shoe
  - type: textarea
    id: snippet
    attributes:
      label: Minimal HTML snippet (if you can share one)
      description: The smallest markup that reproduces the issue.
      render: html
  - type: input
    id: rule-id
    attributes:
      label: Rule ID(s) involved
      description: e.g. `a11y.image_alt.missing`, `analytics.ga4.duplicate`.
  - type: input
    id: version
    attributes:
      label: ShipCheck version
      description: Output of `shipcheck --version`.
      placeholder: 0.1.1
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: v20.11.0
    validations:
      required: true
