    <meta charset="utf-8" />
    <title>Duplicate GA4 Example Store</title>
    <meta name="description" content="A demo page that accidentally loads the same GA4 tag twice." />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ABCDE12345"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag('js', new Date());
      gtag('config', 'G-ABCDE12345');
    </script>
    <!-- Oops: the same GA4 loader again (e.g. also injected via GTM). -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ABCDE12345"></script>
  </head>

    <h1>Store</h1>
  </body>
