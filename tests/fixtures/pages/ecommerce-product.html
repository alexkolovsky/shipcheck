<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Blue Running Shoes — Example Store</title>
    <meta
      name="description"
      content="Lightweight blue running shoes with responsive cushioning for daily training and races."
    />
    <meta property="og:title" content="Blue Running Shoes" />
    <meta property="og:image" content="https://example.com/shoes.jpg" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Product",
        "name": "Blue Running Shoes",
        "image": "https://example.com/shoes.jpg",
        "offers": {
          "@type": "Offer",
          "price": "89.99",
          "priceCurrency": "USD",
          "availability": "https://schema.org/InStock"
        }
      }
    </script>
  </head>
  <body>
    <h1>Blue Running Shoes</h1>
    <img src="https://example.com/shoes.jpg" alt="Blue running shoes" width="600" height="400" />
    <button type="button" class="add-to-cart">Add to cart</button>
    <a href="/cart">View cart</a>
  </body>
</html>
